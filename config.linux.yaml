# config.linux.yaml — Ryzen 9 5950X + RTX 3090 x2 (48GB VRAM total)
# A=practical stack, B=normalized engine (same backend/weights across hw), C=concurrency
comparison_mode: A

generation:
  temperature: 0
  top_p: 1.0
  repeat_penalty: 1.0
  context_window: 262144  # 256K — Qwen3.5 max native context

benchmark:
  warmup_runs: 1
  measure_runs: 5
  inter_run_sleep: 5
  inter_track_sleep: 60
  inter_model_sleep: 120
  inter_backend_sleep: 60

thermal:
  enabled: true
  max_temp_celsius: 85
  check_interval: 10
  cooldown_wait: 60
  log_temp: true

hardware:
  id: "linux-5950x-3090x2"
  description: "Ryzen 9 5950X + RTX 3090 x2, 128GB DDR4 + 48GB VRAM"

# ─────────────────────────────────────────
# Track 1: Generation
# ─────────────────────────────────────────
generation_tracks:
  - id: "gen-512"
    max_tokens: 512
    input_tokens: 64
  - id: "gen-2048"
    max_tokens: 2048
    input_tokens: 64
  - id: "gen-4096"
    max_tokens: 4096
    input_tokens: 64
  - id: "gen-8192"
    max_tokens: 8192
    input_tokens: 64

# ─────────────────────────────────────────
# Track 2: Prefill
# ─────────────────────────────────────────
prefill_tracks:
  - id: "prefill-1k"
    max_tokens: 10
    input_tokens: 1024
  - id: "prefill-4k"
    max_tokens: 10
    input_tokens: 4096
  - id: "prefill-16k"
    max_tokens: 10
    input_tokens: 16384
  - id: "prefill-64k"
    max_tokens: 10
    input_tokens: 65536
  - id: "prefill-128k"
    max_tokens: 10
    input_tokens: 131072

backends:
  ollama:
    enabled: true
    base_url: "http://localhost:11434"
  lmstudio:
    enabled: false
    base_url: "http://localhost:1234"
  llamacpp:
    enabled: true
    base_url: "http://localhost:8082"
    binary: "llama-server"
    n_gpu_layers: 99
    flash_attn: true
    batch_size: 512
    ubatch_size: 512
    threads: null
    threads_batch: null
    mlock: false
    extra_args: []
  mlx:
    enabled: false    # macOS only
  vllm:
    enabled: true
    base_url: "http://localhost:8000"
    binary: "vllm"
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.90
    max_model_len: 32768
    cpu_offload_gb: 0
    extra_args: []
  sglang:
    enabled: false
    base_url: "http://localhost:30000"
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.90
    max_model_len: 32768
    cpu_offload_gb: 0
    extra_args: []
  lemonade:
    enabled: false
    base_url: "http://localhost:8000"

models:
  - id: "qwen3.5-9b"
    architecture: "dense"
    total_params: "9B"
    active_params: "9B"
    context_window: 262144
    quantizations:
      - name: "Q4_K_M"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q4_K_M.gguf"
        lmstudio_model: ""
        ollama_model: "qwen3.5:9b-q4_K_M"
        mlx_model: ""
        lemonade_model: ""
        vllm_model: "Qwen/Qwen3.5-9B"
        vllm_quantization: null
      - name: "Q8_0"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q8_0.gguf"
        lmstudio_model: ""
        ollama_model: "qwen3.5:9b-q8_0"
        mlx_model: ""
        lemonade_model: ""
        vllm_model: "Qwen/Qwen3.5-9B"
        vllm_quantization: null

  - id: "qwen3.5-27b"
    architecture: "dense"
    total_params: "27B"
    active_params: "27B"
    context_window: 262144
    quantizations:
      - name: "Q4_K_M"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-27B-GGUF/Qwen3.5-27B-Q4_K_M.gguf"
        lmstudio_model: ""

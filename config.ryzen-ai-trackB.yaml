# Ryzen AI MAX 395+ — Track B (Normalized Engine: llamacpp only)
# Same hardware/model config as config.ryzen-ai.yaml but comparison_mode: B
# BIOS VRAM: 96GB, OS RAM: ~31GB
comparison_mode: B

generation:
  temperature: 0
  top_p: 1.0
  repeat_penalty: 1.0
  context_window: 262144

benchmark:
  warmup_runs: 1
  measure_runs: 5
  inter_run_sleep: 5
  inter_track_sleep: 60
  inter_model_sleep: 120
  inter_backend_sleep: 60

thermal:
  enabled: true
  max_temp_celsius: 85
  check_interval: 10
  cooldown_wait: 60
  log_temp: true

hardware:
  id: "ryzen-ai-max-395"
  description: "HP Z2 Mini G1a (Ryzen AI MAX 395+), 128GB unified, 96GB VRAM, Radeon 8060S iGPU"

generation_tracks:
  - id: "gen-512"
    max_tokens: 512
    input_tokens: 64
  - id: "gen-2048"
    max_tokens: 2048
    input_tokens: 64
  - id: "gen-4096"
    max_tokens: 4096
    input_tokens: 64
  - id: "gen-8192"
    max_tokens: 8192
    input_tokens: 64

prefill_tracks:
  - id: "prefill-1k"
    max_tokens: 10
    input_tokens: 1024
  - id: "prefill-4k"
    max_tokens: 10
    input_tokens: 4096
  - id: "prefill-16k"
    max_tokens: 10
    input_tokens: 16384
  - id: "prefill-64k"
    max_tokens: 10
    input_tokens: 65536
  - id: "prefill-128k"
    max_tokens: 10
    input_tokens: 131072

backends:
  llamacpp:
    enabled: true
    base_url: "http://localhost:8080"
    binary: "/home/baeumai/llama.cpp/build/bin/llama-server"
    n_gpu_layers: 99
    flash_attn: true
    batch_size: 512
    ubatch_size: 512
    threads: null
    threads_batch: null
    mlock: false
    extra_args: []

models:
  - id: "qwen3.5-9b"
    architecture: "dense"
    total_params: "9B"
    active_params: "9B"
    context_window: 262144
    quantizations:
      - name: "Q4_K_M"
        gguf_path: "~/models/gguf/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q4_K_M.gguf"
        lmstudio_model: ""
        ollama_model: ""
        mlx_model: ""
        lemonade_model: ""
        vllm_model: ""
        vllm_quantization: null
      - name: "Q8_0"
        gguf_path: "~/models/gguf/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q8_0.gguf"
        lmstudio_model: ""

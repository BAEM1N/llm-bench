# A=practical stack, B=normalized engine (same backend/weights across hw), C=concurrency
comparison_mode: B

generation:
  temperature: 0
  top_p: 1.0
  repeat_penalty: 1.0
  context_window: 262144  # 256K — Qwen3.5 max native context
  # 컨텍스트 정책: 전 백엔드 동일 full ctx로 통일 (공정 비교 우선).
  # 실사용(4K–32K)과 다를 수 있음. KV 메모리 점유가 gen_tps에 영향을 준다.
  # 하드웨어별 최적 ctx를 원하면 Mode A + hardware.id 분리 실험으로 비교.

benchmark:
  warmup_runs: 1
  measure_runs: 5
  inter_run_sleep: 5        # seconds between runs
  inter_track_sleep: 60     # seconds between tracks (thermal recovery)
  inter_model_sleep: 120    # seconds between model switches
  inter_backend_sleep: 60   # seconds between backend switches

thermal:
  enabled: true
  max_temp_celsius: 85      # 이 온도 초과 시 대기
  check_interval: 10        # seconds
  cooldown_wait: 60         # 온도 초과 시 대기 시간 (seconds)
  log_temp: true            # 매 run 온도 기록

hardware:
  id: "macbook-m-series"    # 결과 CSV에 포함 — 하드웨어 비교용
  description: "MacBook Pro 14 (M5 Max), 128GB unified memory"

# ─────────────────────────────────────────
# Track 1: Generation — 입력 고정(64 tokens), 출력 고정
# ─────────────────────────────────────────
generation_tracks:
  - id: "gen-512"
    max_tokens: 512
    input_tokens: 64
  - id: "gen-2048"
    max_tokens: 2048
    input_tokens: 64
  - id: "gen-4096"
    max_tokens: 4096
    input_tokens: 64
  - id: "gen-8192"
    max_tokens: 8192
    input_tokens: 64

# ─────────────────────────────────────────
# Track 2: Prefill — 입력 길이 변화, 출력 최소(10 tokens)
# ─────────────────────────────────────────
prefill_tracks:
  - id: "prefill-1k"
    max_tokens: 10
    input_tokens: 1024
  - id: "prefill-4k"
    max_tokens: 10
    input_tokens: 4096
  - id: "prefill-16k"
    max_tokens: 10
    input_tokens: 16384
  - id: "prefill-64k"
    max_tokens: 10
    input_tokens: 65536
  - id: "prefill-128k"
    max_tokens: 10
    input_tokens: 131072

# ─────────────────────────────────────────
# Concurrency Benchmark (Phase 1 — Closed-loop)
# src/concurrent_runner.py 에서 사용
# ─────────────────────────────────────────
concurrency_benchmark:
  enabled: true
  # 동시 요청 수 레벨 (Pass 1 Coarse Scan)
  levels: [1, 2, 4, 8]
  warmup_runs: 1
  measure_runs: 5
  request_timeout_s: 600
  # 동일 프롬프트 캐시/dedup 방지
  prompt_nonce: true
  # 포함할 트랙 (generation_tracks / prefill_tracks ID 기준)
  include_generation_tracks: ["gen-512", "gen-2048", "gen-8192"]
  include_prefill_tracks: []       # Phase 2에서 추가
  # Phase 2 Open-loop: 도착률 목록 (req/s). 빈 리스트 = 비활성화
  open_loop_rates: []              # e.g. [0.5, 1.0, 2.0]
  open_loop_duration_s: 60        # 각 rate 측정 시간 (seconds)
  # 환산 온라인 사용자 추정: max_concurrency / (T_gen / T_user)
  user_interval_assumptions_s: [15, 30, 60]
  # SLA 기준
  sla:
    success_rate_min: 0.99
    ttft_p95_ms: 3000              # gen-512, gen-2048 기준
    latency_p95_s: 30
    req_gen_tps_p50_min: 10
    # gen-8192 완화 SLA
    ttft_p95_ms_long: 5000
    latency_p95_s_long: 180

backends:
  # ── Mac (Apple Silicon) ───────────────────────────────────────────────────
  ollama:
    enabled: true
    base_url: "http://localhost:11434"
  lmstudio:
    enabled: false
    base_url: "http://localhost:1234"
  llamacpp:
    enabled: true
    base_url: "http://localhost:8080"
    binary: "llama-server"
    # n_gpu_layers 플랫폼별 권장값:
    #   Mac M5 Max (128GB unified)       : 99  (전 레이어 GPU)
    #   DGX Spark (128GB unified)        : 99  (전 레이어 GPU)
    #   Ryzen AI MAX 395+ (128GB unified): 99  (전 레이어 GPU)
    #   linux-5950x-3090x2 — 9B/27B/35B : 99  (48GB VRAM에 전부 들어감)
    #   linux-5950x-3090x2 — 122B Q4_K_M: 60  (≈65GB 중 ~43GB GPU, 나머지 RAM 오프로드)
    #     → 122B 실행 시 이 값을 60으로 변경 후 실행할 것
    n_gpu_layers: 99      # -1 = CPU only, 99 = all layers to GPU
    flash_attn: true      # --flash-attn: prefill 속도 향상 (Metal/CUDA 지원)
    batch_size: 512       # --batch-size: prefill 배치 크기
    ubatch_size: 512      # --ubatch-size: 마이크로 배치 크기
    threads: null         # --threads: null = llama.cpp 자동 결정
    threads_batch: null   # --threads-batch: null = llama.cpp 자동 결정
    mlock: false          # --mlock: 모델을 RAM에 고정 (swap 방지)
    extra_args: []        # 추가 raw 플래그 (e.g. ["--numa", "numactl"])
  mlx:
    enabled: true         # macOS 전용. Linux/Windows에서는 false로 설정.

  # ── NVIDIA GPU (3090 2-WAY / DGX Spark) ───────────────────────────────────
  # 실행: `vllm serve <model_id> --tensor-parallel-size 2 ...`
  # 사전 조건: pip install vllm (CUDA 빌드)
  vllm:
    enabled: false        # NVIDIA 환경에서만 true로 변경
    base_url: "http://localhost:8000"
    binary: "vllm"
    tensor_parallel_size: 2   # 3090 2-WAY / DGX Spark. 단일 GPU이면 1.
    gpu_memory_utilization: 0.90
    # KV cache가 VRAM을 많이 차지함 → 플랫폼별 권장값:
    #   3090 2-WAY (48GB VRAM)          : 32768  (32K)
    #   DGX Spark (128GB unified)       : 65536  (64K)
    #   Ryzen AI MAX 395+ (128GB unified): 65536 (64K) — Strix Halo, 유니파이드 메모리 (Apple Silicon과 동일 구조)
    max_model_len: 32768
    # VRAM 초과 모델 CPU 오프로드 (GB). 0 = 오프로드 없음.
    # 3090 2-WAY (48GB) + 122B Q4_K_M (~65GB): 20 으로 설정
    # DGX Spark / Ryzen AI MAX: 0 (전부 GPU에 올라감)
    cpu_offload_gb: 0
    extra_args: []

  # ── SGLang (NVIDIA — vLLM 대비 throughput 비교용) ─────────────────────────
  # 설치: pip install sglang[all]
  # vLLM과 동일 모델(GPTQ-Int4) 사용. sglang_model 미설정 시 vllm_model 자동 사용.
  sglang:
    enabled: false        # NVIDIA 환경에서만 true로 변경
    base_url: "http://localhost:30000"
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.90
    max_model_len: 32768
    cpu_offload_gb: 0
    extra_args: []

  # ── AMD Ryzen AI (Lemonade Server) ──────────────────────────────────────────
  # AMD 공식 로컬 추론 서버. 내부 llama.cpp (Vulkan/ROCm) 사용.
  # 설치: deb/rpm/snap. 실행: lemonade-server serve --llamacpp rocm --port 8000
  # Ryzen AI MAX 395+ 전용. 다른 디바이스에서는 false.
  lemonade:
    enabled: false
    base_url: "http://localhost:8000"

models:
  - id: "qwen3.5-9b"
    architecture: "dense"
    total_params: "9B"
    active_params: "9B"
    context_window: 262144
    quantizations:
      - name: "Q4_K_M"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q4_K_M.gguf"
        lmstudio_model: "qwen3.5-9b@q4_k_m"
        ollama_model: "qwen3.5:9b-q4_K_M"
        mlx_model: "~/.cache/mlx/Qwen3.5-9B-4bit"
        lemonade_model: "Qwen3.5-9B-GGUF"
        # 9B GPTQ-Int4 미출시. BF16 (~18GB) → 단일 3090 가능.
        vllm_model: "Qwen/Qwen3.5-9B"
        vllm_quantization: null
      - name: "Q8_0"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q8_0.gguf"
        lmstudio_model: "qwen3.5-9b@q8_0"
        ollama_model: "qwen3.5:9b-q8_0"
        mlx_model: "~/.cache/mlx/Qwen3.5-9B-8bit"
        lemonade_model: ""
        vllm_model: "Qwen/Qwen3.5-9B"
        vllm_quantization: null

  - id: "qwen3.5-27b"
    architecture: "dense"
    total_params: "27B"
    active_params: "27B"
    context_window: 262144
    quantizations:
      - name: "Q4_K_M"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-27B-GGUF/Qwen3.5-27B-Q4_K_M.gguf"
        lmstudio_model: "qwen3.5-27b@q4_k_m"
        ollama_model: "qwen3.5:27b-q4_K_M"
        mlx_model: "~/.cache/mlx/Qwen3.5-27B-4bit"
        lemonade_model: "Qwen3.5-27B-GGUF"
        vllm_model: "Qwen/Qwen3.5-27B-GPTQ-Int4"
        vllm_quantization: "gptq"
      - name: "Q8_0"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-27B-GGUF/Qwen3.5-27B-Q8_0.gguf"
        lmstudio_model: "qwen3.5-27b@q8_0"
        ollama_model: "qwen3.5:27b-q8_0"
        mlx_model: "~/.cache/mlx/Qwen3.5-27B-8bit"
        lemonade_model: ""
        # BF16 ~55GB → 3090 2-WAY (48GB) 초과. DGX Spark (128GB)에서만 실행.
        vllm_model: "Qwen/Qwen3.5-27B"
        vllm_quantization: null

  - id: "qwen3.5-35b-a3b"
    architecture: "moe"
    total_params: "35B"
    active_params: "3B"
    context_window: 262144
    quantizations:
      - name: "Q4_K_M"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-35B-A3B-GGUF/Qwen3.5-35B-A3B-Q4_K_M.gguf"
        lmstudio_model: "qwen/qwen3.5-35b-a3b"
        ollama_model: "qwen3.5:35b-a3b-q4_K_M"
        mlx_model: "~/.cache/mlx/Qwen3.5-35B-A3B-4bit"
        lemonade_model: "Qwen3.5-35B-A3B-GGUF"
        # MoE: total weights ~20GB → 단일 3090 (24GB)에서도 실행 가능
        vllm_model: "Qwen/Qwen3.5-35B-A3B-GPTQ-Int4"
        vllm_quantization: "gptq"
      - name: "Q8_0"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-35B-A3B-GGUF/Qwen3.5-35B-A3B-Q8_0.gguf"
        lmstudio_model: "qwen/qwen3.5-35b-a3b"
        ollama_model: "qwen3.5:35b-a3b-q8_0"
        mlx_model: "~/.cache/mlx/Qwen3.5-35B-A3B-8bit"
        lemonade_model: ""
        # BF16 ~70GB → 3090 2-WAY (48GB) 초과. DGX Spark에서만.
        vllm_model: "Qwen/Qwen3.5-35B-A3B"
        vllm_quantization: null

  - id: "qwen3.5-122b-a10b"
    architecture: "moe"
    total_params: "122B"
    active_params: "10B"
    context_window: 262144
    quantizations:
      - name: "Q4_K_M"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-122B-A10B-GGUF/Qwen3.5-122B-A10B-Q4_K_M-00001-of-00003.gguf"
        lmstudio_model: "qwen3.5-122b-a10b"
        ollama_model: "qwen3.5:122b-a10b-q4_K_M"
        mlx_model: "~/.cache/mlx/Qwen3.5-122B-A10B-4bit"
        lemonade_model: "Qwen3.5-122B-A10B-GGUF"
        # GPTQ-Int4 ~65GB → 3090 2-WAY cpu_offload_gb: 20 필요. DGX Spark는 오프로드 불필요.
        vllm_model: "Qwen/Qwen3.5-122B-A10B-GPTQ-Int4"
        vllm_quantization: "gptq"

  # ─────────────────────────────────────────
  # Gemma 4 시리즈 (Google, multimodal — text-only 벤치마크)

        lmstudio_model: "qwen3.5-27b@q8_0"
        ollama_model: "qwen3.5:27b-q8_0"
        mlx_model: "~/.cache/mlx/Qwen3.5-27B-8bit"

  - id: "qwen3.5-35b-a3b"
    architecture: "moe"
    total_params: "35B"
    active_params: "3B"
    context_window: 262144
    quantizations:
      - name: "Q4_K_M"
        gguf_path: "~/.lmstudio/models/unsloth/Qwen3.5-35B-A3B-GGUF/Qwen3.5-35B-A3B-Q4_K_M.gguf"
        lmstudio_model: "qwen/qwen3.5-35b-a3b"

        vllm_model: "Qwen/Qwen3.5-27B-GPTQ-Int4"
        vllm_quantization: "gptq"
      - name: "Q8_0"
        gguf_path: "~/models/gguf/Qwen3.5-27B-GGUF/Qwen3.5-27B-Q8_0.gguf"
        lmstudio_model: ""
        ollama_model: "qwen3.5:27b-q8_0"
        mlx_model: ""

# Ryzen AI MAX 395+ (HP Z2 Mini G1a, 128GB) — Full Benchmark v3
# Strix Halo: iGPU Radeon 8060S (40 CU, RDNA 3.5) + 128GB unified memory
# BIOS VRAM: 96GB, usable system RAM: ~31GB
# VRAM confirmed: 96GB via /sys/class/drm/card*/device/mem_info_vram_total
# All models including 122B (65GB) fit entirely in GPU VRAM
# --no-mmap: load directly to GPU (OS RAM tight at 31GB)
comparison_mode: A

generation:
  temperature: 0
  top_p: 1.0
  repeat_penalty: 1.0
  context_window: 262144   # 256K — Qwen3.5 max native context. OOM = fail.

benchmark:
  warmup_runs: 1
  measure_runs: 5
  inter_run_sleep: 5
  inter_track_sleep: 60
  inter_model_sleep: 120
  inter_backend_sleep: 60

thermal:
  enabled: true
  max_temp_celsius: 85
  check_interval: 10
  cooldown_wait: 60
  log_temp: true

hardware:
  id: "ryzen-ai-max-395"
  description: "HP Z2 Mini G1a (Ryzen AI MAX 395+), 128GB unified, 96GB VRAM, Radeon 8060S iGPU"

generation_tracks:
  - id: "gen-512"
    max_tokens: 512
    input_tokens: 64
  - id: "gen-2048"
    max_tokens: 2048
    input_tokens: 64
  - id: "gen-4096"
    max_tokens: 4096
    input_tokens: 64
  - id: "gen-8192"
    max_tokens: 8192
    input_tokens: 64

prefill_tracks:
  - id: "prefill-1k"
    max_tokens: 10
    input_tokens: 1024
  - id: "prefill-4k"
    max_tokens: 10
    input_tokens: 4096
  - id: "prefill-16k"
    max_tokens: 10
    input_tokens: 16384
  - id: "prefill-64k"
    max_tokens: 10
    input_tokens: 65536
  - id: "prefill-128k"
    max_tokens: 10
    input_tokens: 131072

backends:
  ollama:
    enabled: true
    base_url: "http://localhost:11434"
  llamacpp:
    enabled: true
    base_url: "http://localhost:8080"
    binary: "/home/baeumai/llama.cpp/build/bin/llama-server"
    n_gpu_layers: 99      # 96GB VRAM — all layers fit
    flash_attn: true
    batch_size: 512
    ubatch_size: 512
    threads: null
    threads_batch: null
    mlock: false
    extra_args: []
  vllm:
    enabled: true
    base_url: "http://localhost:8000"
    binary: "vllm"
    tensor_parallel_size: 1
    gpu_memory_utilization: 0.90
    max_model_len: 65536   # KV cache limit even with 96GB VRAM
    cpu_offload_gb: 0
    extra_args: []
  lemonade:
    enabled: true
    base_url: "http://localhost:8001"

models:
  - id: "qwen3.5-9b"
    architecture: "dense"
    total_params: "9B"
    active_params: "9B"
    context_window: 262144
    quantizations:
      - name: "Q4_K_M"
        gguf_path: "~/models/gguf/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q4_K_M.gguf"
        lmstudio_model: ""
        ollama_model: "qwen3.5:9b-q4_K_M"
        mlx_model: ""
        lemonade_model: "Qwen3.5-9B-GGUF"
        vllm_model: "Qwen/Qwen3.5-9B"
        vllm_quantization: null
      - name: "Q8_0"
        gguf_path: "~/models/gguf/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q8_0.gguf"
        lmstudio_model: ""
        ollama_model: "qwen3.5:9b-q8_0"
        mlx_model: ""
        lemonade_model: ""
        vllm_model: "Qwen/Qwen3.5-9B"
        vllm_quantization: null

  - id: "qwen3.5-27b"
    architecture: "dense"
    total_params: "27B"
    active_params: "27B"
    context_window: 262144
    quantizations:
      - name: "Q4_K_M"
        gguf_path: "~/models/gguf/Qwen3.5-27B-GGUF/Qwen3.5-27B-Q4_K_M.gguf"
        lmstudio_model: ""
        ollama_model: "qwen3.5:27b-q4_K_M"
        mlx_model: ""
